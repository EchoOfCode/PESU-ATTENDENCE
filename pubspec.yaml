name: pesu_attendance
description: PESU Academy Attendance Home Screen Widget
publish_to: 'none'
version: 1.0.5+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  html: ^0.15.4
  home_widget: ^0.7.0
  workmanager: ^0.6.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.4.13

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_size: 21

flutter:
  uses-material-design: true
